<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Left Half-Vinyl Orbit Portfolio</title>
	<link rel="stylesheet" href="css/index.style.css">
<!--	<script src="js/index.js" defer></script>-->
</head>
<body>
	
	<div class="turntable-zone">
		
		<div class="orbit-vinyl" id="vinylGroup">
			
			<div class="vinyl-plate">
				<div class="vinyl-grooves"></div>
				<div class="vinyl-center-label">
					<div class="center-hole"></div>
				</div>
			</div>
			
			<div class="track-orbit-container">
				
				<div class="orbit-item" style="--item-angle: 0deg; --random-tilt: -3deg; --offset-y: 0px;">
					<div class="meta-tag">TRACK 01 // PLAYLIST!</div>
					<div class="track-card intro-card">
						<span class="index-num">001</span>
						<h1>JAY'S<br>MELODIES</h1>
						<p class="sub-text">[spin to play the track]</p>
					</div>
				</div>
				
				<div class="orbit-item" style="--item-angle: 35deg; --random-tilt: 5deg; --offset-y: 40px;">
					<div class="meta-tag">TRACK 02 // SELECTED WORK</div>
					<div class="track-card project-card" onclick="window.open('https://example.com/project1', '_blank')">
						<span class="index-num">002</span>
						<div class="card-preview-zone" style="background-color: #909b82;">whodunit</div>
						<div class="card-body">
							<h3>whodunit</h3>
							<p>Branding & Creative Interaction Web Design Concept.</p>
							<span class="link-badge">VIEW WORK TRACK ↗</span>
						</div>
					</div>
				</div>
				
				<div class="orbit-item" style="--item-angle: 70deg; --random-tilt: -6deg; --offset-y: -20px;">
					<div class="meta-tag">TRACK 03 // SELECTED WORK</div>
					<div class="track-card project
